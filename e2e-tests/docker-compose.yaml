services:
  eureka-server:
    build:
      context: ../eureka-server
    ports:
      - "8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  game-engine:
    build:
      context: ../game-engine
    ports:
      - "8081"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  session-service:
    build:
      context: ../session-service
    ports:
      - "8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      game-engine:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  gateway:
    build:
      context: ../gateway
    ports:
      - "8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/